<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مولد الرمز | QB-Sentinel</title>
    <link rel="stylesheet" href="generator-style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="setupScreen" class="setup-overlay hidden">
        <div class="setup-card">
            <i data-lucide="tablet-smartphone" class="setup-icon"></i>
            <h2>إعداد جهاز جديد</h2>
            <p>يرجى إدخال رقم تعريف الجهاز المخصص لهذا الفرع</p>
            <input type="text" id="deviceIdInput" placeholder="مثلاً: IPAD-DAW-01">
            <button id="saveSetupBtn">حفظ وإعداد الجهاز</button>
        </div>
    </div>

    <div class="main-container">
        <header>
            <h1 id="deviceDisplay">جهاز التحقق</h1>
            <div id="connectionStatus" class="status-badge">
                <span class="dot"></span> متصل بالشبكة
            </div>
        </header>

        <div class="qr-section">
            <div id="qrContainer" class="qr-box">
                </div>
            <div class="qr-info">
                <h2 id="processTitle">يرجى اختيار العملية</h2>
                <p id="timestamp">--:--:--</p>
            </div>
        </div>

        <div class="action-buttons">
            <button id="btnIn" class="btn-action in">
                <i data-lucide="log-in"></i>
                <span>تسجيل حضور</span>
                <small>Check-In</small>
            </button>
            <button id="btnOut" class="btn-action out">
                <i data-lucide="log-out"></i>
                <span>تسجيل انصراف</span>
                <small>Check-Out</small>
            </button>
        </div>

        <footer class="sync-info">
            <p>سيتم تحديث الكود تلقائياً لضمان الأمان</p>
            <div id="timerBar" class="timer-progress"></div>
        </footer>
    </div>

    <script src="generator-script.js"></script>
</body>
</html>
