<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الحضور والانصراف | QB-Sentinel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div id="customModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div id="modalIcon" class="modal-icon"></div>
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <div id="modalLoader" class="modal-loader hidden"></div>
        <button id="modalClose" class="modal-btn hidden">موافق / OK</button>
    </div>
</div>

<div class="form-container">
    <header class="main-header">
        <div class="header-overlay"></div>
        <div class="logo-area">
            <h1>نظام الحضور والانصراف</h1>
            <p class="en-sub">STAFF ATTENDANCE SYSTEM</p>
        </div>
    </header>

    <div class="card">
        <div class="section-title">
            <i data-lucide="map-pin"></i>
            <span>اختر الفرع / Select Branch</span>
        </div>
        <div class="branch-selector">
            <label class="branch-btn">
                <input type="radio" name="branch" value="Dawadimi">
                <span>الدوادمي</span>
            </label>
            <label class="branch-btn">
                <input type="radio" name="branch" value="Muzahmiyah">
                <span>المزاحمية</span>
            </label>
        </div>

        <div id="employeeSection" class="hidden">
            <div class="section-title">
                <i data-lucide="users"></i>
                <span>اختر اسمك / Select Your Name</span>
            </div>
            <div id="employeeGrid" class="employee-grid"></div>
        </div>

        <div id="branchConfigSection">
    <div class="section-title">
        <i data-lucide="shield-check"></i>
        <span>كود التحقق للفرع / Branch Code</span>
    </div>
    <input type="password" id="branchCodeInput" placeholder="أدخل كود الفرع الخاص بك" class="main-input">
</div>

<button id="resetBtn" class="reset-link hidden" onclick="resetEmployeeDevice()">إعادة تهيئة الجهاز (للمدير فقط)</button>

        <div id="scannerSection" class="hidden">
            <div class="section-title">
                <i data-lucide="qr-code"></i>
                <span>امسح الكود من الآيباد / Scan QR</span>
            </div>
            <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden;"></div>
            <p class="hint-text">وجه الكاميرا نحو شاشة الآيباد الثابتة في المحل</p>
        </div>
    </div>

    <footer class="developer-footer">
        <span class="version-number"></span>
        <p>برمجيات QB-Sentinel - بلال الخواجة</p>
    </footer>
</div>

<script src="ATT.js"></script>

<style>
    .locked { opacity: 0.7; pointer-events: none; }
    .main-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; text-align: center; font-size: 1.2rem; }
    .reset-link { background: none; border: none; color: #ff4444; cursor: pointer; margin-top: 20px; font-size: 0.9rem; text-decoration: underline; width: 100%; }
    .hidden { display: none; }
</style>

</body>
</html>
